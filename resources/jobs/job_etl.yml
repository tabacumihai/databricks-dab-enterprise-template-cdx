resources:
  jobs:
    customer_events_etl:
      name: customer_events_etl_${bundle.target}

      tags:
        project: databricks-dab-enterprise-template
        environment: ${bundle.target}
        domain: demo

      permissions:
        - level: CAN_MANAGE
          user_name: ${var.owner_email}

      queue:
        enabled: true

      max_concurrent_runs: 1

      email_notifications:
        on_failure:
          - ${var.owner_email}

      tasks:
        - task_key: create_table
          notebook_task:
            notebook_path: ../../notebooks/etl/01_create_table.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_name: customer_events
          environment_key: default

        - task_key: insert_data
          depends_on:
            - task_key: create_table
          notebook_task:
            notebook_path: ../../notebooks/etl/02_insert_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_name: customer_events
              row_count: "25"
          environment_key: default

        - task_key: quality_check
          depends_on:
            - task_key: insert_data
          notebook_task:
            notebook_path: ../../notebooks/etl/03_quality_check.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_name: customer_events
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - ../requirements.txt
