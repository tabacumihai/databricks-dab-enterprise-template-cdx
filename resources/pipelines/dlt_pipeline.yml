resources:
  pipelines:
    customer_events_pipeline:
      name: customer_events_pipeline_${bundle.target}
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      channel: CURRENT

      libraries:
        - file:
            path: ../../notebooks/dlt/pipeline.sql

      configuration:
        source_catalog: ${var.catalog}
        source_schema: ${var.schema}
        source_table: customer_events

      permissions:
        - level: CAN_MANAGE
          user_name: ${var.owner_email}
